name: Go Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      garble:
        description: "Enable garble obfuscation"
        required: false
        default: false
        type: boolean
      upx:
        description: "Enable UPX LZMA compression"
        required: false
        default: false
        type: boolean
      archive_format:
        description: "Backup archive format"
        required: false
        default: "tar"
        type: choice
        options:
          - "tar"
          - "7z"
      run_lint:
        description: "Run golangci-lint"
        required: false
        default: true
        type: boolean
      run_tests:
        description: "Run go test ./... after build"
        required: false
        default: true
        type: boolean
      timeout:
        description: "Build script prompt timeout (seconds)"
        required: false
        default: 1
        type: number

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build:
    runs-on: ubuntu-slim
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: "1.25.3"
        cache: true

    - name: Run golangci-lint
      if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_lint == 'true' }}
      uses: golangci/golangci-lint-action@v9
      continue-on-error: true
      with:
        version: latest
        only-new-issues: true

    - name: Cache Go Build
      uses: actions/cache@v4
      with:
        path: ~/.cache/go-build
        key: ${{ runner.os }}-go-build-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-go-build-${{ runner.os }}

    - name: Go Module Init
      if: hashFiles('go.mod') == ''
      run: |
        go mod init
        go mod tidy
      continue-on-error: true

    - name: Tidy Modules
      if: hashFiles('go.mod') != ''
      run: go mod tidy
      continue-on-error: true

    - name: Build
      if: hashFiles('go.mod') != ''
      run: |
        ARGS="--no-tui --verbose --timeout ${{ inputs.timeout || 1 }}"
        if [ "${{ inputs.garble }}" = "true" ]; then
          ARGS="$ARGS --garble"
        fi
        if [ "${{ inputs.upx }}" = "true" ]; then
          ARGS="$ARGS --upx"
        fi
        if [ -n "${{ inputs.archive_format }}" ] && [ "${{ inputs.archive_format }}" != "tar" ]; then
          ARGS="$ARGS --archive-format ${{ inputs.archive_format }}"
        fi
        go run scripts/build/build.go $ARGS

    - name: Test
      if: hashFiles('go.mod') != '' && (github.event_name != 'workflow_dispatch' || inputs.run_tests == 'true')
      run: go test -v ./...
      continue-on-error: true
