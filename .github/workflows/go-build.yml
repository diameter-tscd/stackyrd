name: Go Build

on:
  push:
    branches: [ "main", "master" ]

jobs:

  build:
    runs-on: ubuntu-slim
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: "1.25.5"

    - name: Go Module Init
      run: |
        rm -rf go.mod
        go mod init
        go mod tidy
      continue-on-error: true

    - name: Build
      run: go build -v ./cmd/app/

    - name: Test
      run: go test -v ./...
      continue-on-error: true
