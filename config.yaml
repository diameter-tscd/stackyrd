app:
  name: "stackyrd-nano"
  version: "1.0.3n-clover"
  debug: true
  env: "development"
  banner_path: "banner.txt"
  startup_delay: 3
  quiet_startup: true
  enable_tui: true

server:
  port: "8080"
  services_endpoint: /api/v1

middleware:
  request_id: true
  logger: true
  permission_check: true
  cors: true
  jwt: false
  ratelimit: true
  security: true
  audit: true
  encryption: false
  gzip: true

auth:
  type: "apikey"
  secret: "super-secret-key"

postgres:
  enabled: true
  connections:
    - name: "primary"
      enabled: true
      host: "localhost"
      port: 5432
      user: "postgres"
      password: "Mypostgres01"
      dbname: "postgres"
      sslmode: "disable"

encryption:
  enabled: false
  algorithm: "aes-256-gcm"
  key: ""
  rotate_keys: false
  key_rotation_interval: "24h"
